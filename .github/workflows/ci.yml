name: CI/CD - Django

# Cuándo se ejecuta el pipeline
on:
  push:
    branches: ["main", "ci-setup"]
  pull_request:
    branches: ["main"]
  workflow_dispatch: # permite ejecutarlo manualmente desde la pestaña Actions

jobs:
  # ====================================================================
  # JOB 1 - CI: Pruebas automatizadas contra PostgreSQL
  # ====================================================================
  test:
    name: Ejecutar pruebas de Django
    runs-on: ubuntu-latest

    # Servicio de PostgreSQL para que los tests corran contra una BD real
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: gcs_db
          POSTGRES_USER: gcs_user
          POSTGRES_PASSWORD: gcs_pass
        ports:
          - 5432:5432
        # Espera a que Postgres esté listo antes de continuar
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    # Variables de entorno que lee project/settings.py
    env:
      DJANGO_SECRET_KEY: clave-de-prueba-para-ci
      DJANGO_DEBUG: "False"
      POSTGRES_DB: gcs_db
      POSTGRES_USER: gcs_user
      POSTGRES_PASSWORD: gcs_pass
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432

    steps:
      - name: Clonar el repositorio
        uses: actions/checkout@v4

      - name: Configurar Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verificar el proyecto (django check)
        run: python manage.py check

      - name: Aplicar migraciones
        run: python manage.py migrate

      - name: Ejecutar pruebas
        run: python manage.py test --verbosity 2

  # ====================================================================
  # JOB 2 - BUILD: Construir la imagen Docker y guardarla como artefacto
  #          Solo se ejecuta si el job 'test' terminó con éxito.
  # ====================================================================
  build:
    name: Construir imagen Docker
    needs: test # depende de que las pruebas pasen
    runs-on: ubuntu-latest

    steps:
      - name: Clonar el repositorio
        uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Construir la imagen Docker
        run: |
          docker build -t gcs-web:latest -t gcs-web:${{ github.sha }} .
          echo "Imagen construida correctamente:"
          docker images gcs-web

      - name: Empaquetar la imagen en un archivo .tar
        run: docker save gcs-web:latest -o gcs-web-image.tar

      - name: Subir la imagen como artefacto de GitHub
        uses: actions/upload-artifact@v4
        with:
          name: imagen-docker-django
          path: gcs-web-image.tar
          retention-days: 7

      # ----------------------------------------------------------------
      # DESPLIEGUE A DOCKERHUB (SIMULADO)
      # Se imprime lo que se ejecutaría en un despliegue real. Para
      # activarlo de verdad: descomentar el bloque y crear los secrets
      # DOCKERHUB_USER y DOCKERHUB_TOKEN en Settings > Secrets.
      # ----------------------------------------------------------------
      - name: (SIMULADO) Publicar imagen en DockerHub
        run: |
          echo "=========================================================="
          echo " SIMULACIÓN DE PUSH A DOCKERHUB"
          echo "=========================================================="
          echo "En un despliegue real se ejecutaría:"
          echo "  docker login -u \$DOCKERHUB_USER -p \$DOCKERHUB_TOKEN"
          echo "  docker tag gcs-web:latest \$DOCKERHUB_USER/gcs-web:latest"
          echo "  docker push \$DOCKERHUB_USER/gcs-web:latest"
          echo "Imagen lista para desplegar: gcs-web:${{ github.sha }}"

