<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Tareas</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 720px;
               margin: 2rem auto; padding: 0 1rem; color: #1f2933; }
        h1 { color: #2563eb; }
        .resumen { background: #eff6ff; padding: 1rem; border-radius: 8px;
                   margin-bottom: 1.5rem; }
        ul { list-style: none; padding: 0; }
        li { padding: .75rem 1rem; border: 1px solid #e2e8f0;
             border-radius: 6px; margin-bottom: .5rem; }
        .completada { text-decoration: line-through; color: #94a3b8; }
        .badge { font-size: .75rem; padding: .15rem .5rem; border-radius: 999px;
                 background: #dcfce7; color: #166534; }
    </style>
</head>
<body>
    <h1>Gestión de Tareas</h1>
    <div class="resumen">
        <strong>{{ total }}</strong> tarea(s) en total &middot;
        <strong>{{ completadas }}</strong> completada(s)
    </div>
    <ul>
        {% for tarea in tareas %}
            <li class="{% if tarea.completada %}completada{% endif %}">
                {{ tarea.titulo }}
                {% if tarea.completada %}<span class="badge">Hecha</span>{% endif %}
            </li>
        {% empty %}
            <li>No hay tareas registradas todavía.</li>
        {% endfor %}
    </ul>
</body>
</html>
